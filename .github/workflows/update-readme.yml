name: Update README with file list

on:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate file list and update README
        run: |
          python3 << 'EOF'
          import os
          import yaml

          EXCLUDE = {'.git', '.github', 'node_modules', '__pycache__', '.DS_Store','README.md','1. Rules.md','2. Lore.md','_includes'}
          EXCLUDE_EXT = {'.base','.yml'}
          
          def get_front_matter(filepath):
              try:
                  with open(filepath, 'r') as f:
                      content = f.read()
                  if content.startswith('---'):
                      end = content.index('---', 3)
                      return yaml.safe_load(content[3:end])
              except:
                  pass
              return {}
          
          def get_files_by_tag(root='.'):
              tagged = {}   # tag -> list of (name, path)
              untagged = []
          
              for dirpath, dirnames, filenames in os.walk(root):
                  dirnames[:] = sorted(d for d in dirnames if d not in EXCLUDE)
                  filenames = sorted(f for f in filenames
                                    if f not in EXCLUDE
                                    and not any(f.endswith(ext) for ext in EXCLUDE_EXT))
          
                  for f in filenames:
                      if not f.endswith('.md'):
                          continue
                      rel = os.path.relpath(dirpath, root)
                      path = f if rel == '.' else f"{rel}/{f}"
                      fm = get_front_matter(path)
                      tags = fm.get('tags', []) if fm else []
          
                      if tags:
                          for tag in tags:
                              tagged.setdefault(tag, []).append((f, path))
                      else:
                          untagged.append((f, path))
          
              return tagged, untagged
          
          tagged, untagged = get_files_by_tag()
          
          sections = []
          for tag in sorted(tagged.keys()):
              lines = [f"### {tag.capitalize()}"]
              for name, path in tagged[tag]:
                  lines.append(f"- 📄 [{name}]({path})")
              sections.append('\n'.join(lines))
          
          if untagged:
              lines = ["### Other"]
              for name, path in untagged:
                  lines.append(f"- 📄 [{name}]({path})")
              sections.append('\n'.join(lines))
          
          new_section = "## 📂 File Index\n\n" + '\n\n'.join(sections) + '\n'

          with open('README.md', 'r') as fh:
              content = fh.read()

          START = '<!-- FILE-INDEX-START -->'
          END   = '<!-- FILE-INDEX-END -->'

          if START in content and END in content:
              before = content[:content.index(START)]
              after  = content[content.index(END) + len(END):]
              new_content = f"{before}{START}\n{new_section}{END}{after}"
          else:
              new_content = content + f"\n{START}\n{new_section}{END}\n"

          with open('README.md', 'w') as fh:
              fh.write(new_content)

          print("README.md updated successfully.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (
            git add README.md &&
            git commit -m "chore: update file index in README" &&
            git push
          )
